<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>關鍵字輸入</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 90%;
      max-width: 480px;
      text-align: center;
    }
    h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 28px; font-size: 0.95rem; }
    input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1.1rem;
      border: 2px solid #dde3ff;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }
    input:focus { border-color: #4f6ef7; }
    button {
      width: 100%;
      padding: 14px;
      background: #4f6ef7;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3a56d4; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    .msg {
      margin-top: 18px;
      font-size: 0.95rem;
      min-height: 24px;
      color: #38a169;
    }
    .msg.error { color: #e53e3e; }
    .count { margin-top: 20px; color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>💬 請輸入關鍵字</h1>
    <p>輸入一個詞，送出後會出現在文字雲上</p>
    <input type="text" id="wordInput" placeholder="例如：創新、學習、未來…" maxlength="20" />
    <button id="submitBtn" onclick="submitWord()">送出</button>
    <div class="msg" id="msg"></div>
    <div class="count" id="count"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCI9tvPjo_JzagX-9uRqbaJvVFDnfX0YwU",
      authDomain: "my-teaching-tools-20260628.firebaseapp.com",
      projectId: "my-teaching-tools-20260628",
      storageBucket: "my-teaching-tools-20260628.firebasestorage.app",
      messagingSenderId: "880986817789",
      appId: "1:880986817789:web:71be30eec343c9dcc8ea94"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 即時顯示總筆數
    onSnapshot(collection(db, 'wordcloud_words'), (snap) => {
      document.getElementById('count').textContent = `目前已有 ${snap.size} 個關鍵字`;
    });

    window.submitWord = async function() {
      const input = document.getElementById('wordInput');
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      const word = input.value.trim();

      if (!word) { msg.textContent = '請先輸入關鍵字'; msg.className = 'msg error'; return; }

      btn.disabled = true;
      msg.textContent = '送出中…';
      msg.className = 'msg';

      try {
        await addDoc(collection(db, 'wordcloud_words'), {
          word,
          created_at: serverTimestamp()
        });
        msg.textContent = `✅ 「${word}」已送出！`;
        input.value = '';
      } catch (e) {
        msg.textContent = '送出失敗，請重試';
        msg.className = 'msg error';
        console.error(e);
      } finally {
        btn.disabled = false;
      }
    };

    document.getElementById('wordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.submitWord();
    });
  </script>
</body>
</html>
